<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTM TV1 (Shaka Player + Referer 注入)</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.1/shaka-player.ui.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.1/controls.css">
    
    <style>
        body {
            margin: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
            font-family: sans-serif;
        }
        .video-container {
            width: 100%;
            max-width: 1280px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        video {
            width: 100%;
            height: auto;
        }
    </style>
</head>
<body>

    <div class="video-container" data-shaka-player-container>
        <video id="video" data-shaka-player autoplay></video>
    </div>

    <script>
        async function initApp() {
            shaka.polyfill.installAll();
            
            if (!shaka.Player.isBrowserSupported()) {
                alert('抱歉，你的浏览器不支持 Shaka Player');
                return;
            }
            
            initPlayer();
        }

        async function initPlayer() {
            const video = document.getElementById('video');
            const player = new shaka.Player();
            await player.attach(video);

            // ==========================================
            // 【核心添加部分】：拦截网络请求并注入 Referer
            // ==========================================
            player.getNetworkingEngine().registerRequestFilter(function(type, request) {
                // 我们只需要在请求视频清单 (MANIFEST) 和视频流切片 (MEDIA) 时伪造来源
                if (type == shaka.net.NetworkingEngine.RequestType.MANIFEST || 
                    type == shaka.net.NetworkingEngine.RequestType.MEDIA) {
                    
                    // 尝试将来源伪装成 RTMKlik 官方网站
                    request.headers['Referer'] = 'https://rtmklik.rtm.gov.my/';
                    console.log('已拦截请求，尝试注入 Referer:', request.uris[0]);
                }
            });
            // ==========================================

            // 配置 ClearKey DRM 解密服务器
            player.configure({
                drm: {
                    servers: {
                        'org.w3.clearkey': 'https://php.gohkh7.eu.org/rtmklik/key-1'
                    }
                }
            });

            player.addEventListener('error', onErrorEvent);

            // 你的实际 mpd 视频流地址
            const manifestUri = 'https://d25tgymtnqzu8s.cloudfront.net/live/media0/tv1/DASH/tv1.mpd?id=1';

            try {
                await player.load(manifestUri);
                console.log('视频加载成功，正在播放...');
            } catch (e) {
                onError(e);
            }
        }

        function onErrorEvent(event) {
            onError(event.detail);
        }

        function onError(error) {
            console.error('播放报错:', error.code, error);
        }

        document.addEventListener('DOMContentLoaded', initApp);
    </script>

</body>
</html>
