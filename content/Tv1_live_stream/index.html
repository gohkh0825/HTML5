<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <title>EJALTV - TV1 Live</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="no-referrer" />
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/controls.min.css" crossorigin="anonymous" />
    <style>
        /* 1. 基础清理：防止全屏时出现多余的白边或滚动条 */
        body { 
            margin: 0; 
            background-color: #000; 
            color: white;
            font-family: sans-serif;
            overflow: hidden; 
        }
        
        /* 2. UI 优化：频道标题悬浮化。原来的 <center> 标签不仅已废弃，而且会被播放器层覆盖 */
        .channel-title {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10; /* 确保悬浮在视频上方 */
            opacity: 0.7;
            font-size: 1.5em;
            font-weight: bold;
            pointer-events: none; /* 让鼠标点击穿透，不影响双击全屏等操作 */
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8); /* 增加阴影，在亮色画面也能看清 */
        }

        /* 3. 容器布局优化 */
        .player-container {
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh;
        }

        video {
            width: 100%; 
            height: 100%;
        }

        /* 保留你原有的精美 UI 样式 */
        .shaka-seek-bar-container .shaka-seek-bar,
        .shaka-volume-bar-container .shaka-volume-bar {
            background: linear-gradient(to right, #051937, #00205b, #00247e, #22229f, #510dbc);
        }
        .shaka-video-container .material-icons-round { color: #00abe2; }
        
        .shaka-spinner-path {
            stroke-dasharray: 1, 2000;
            stroke-dashoffset: 0;
            animation: dash 1.5s ease-in-out infinite, color 6s ease-in-out infinite;
            stroke-linecap: round;
        }
        @keyframes color {
            0%, 100% { stroke: #d62d20; }
            40% { stroke: #0057e7; }
            66% { stroke: #008744; }
            80%, 90% { stroke: #ffa700; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/shaka-player.ui.min.js" crossorigin="anonymous"></script>
</head>
<body>

    <div class="channel-title">EJALTV TV1</div>

    <div class="player-container" data-shaka-player-container>
        <video autoplay data-shaka-player poster="https://rtm-images.glueapi.io/480x0/live_channel/TV1.jpg" id="video"></video>
    </div>

    <script>
        const manifestUri = "https://ngtv-live-cbj.gcdn.co/Content/DASH/Live/channel(TV1)/master.mpd";

        async function init() {
            const video = document.getElementById('video');
            const ui = video['ui'];
            const controls = ui.getControls();
            const player = controls.getPlayer();
            
            window.player = player;
            window.ui = ui;

            player.setTextTrackVisibility(true);
            
            player.configure({
                drm: {
                    clearKeys: {
                        '1fe3d74e8cbc4ee0b071a64257068e38': '77ece75d9526f5beac0ab6bf1ee3bd89'
                    }
                },
                abr: {
                    // 优化 1：原代码设为 16888 (不到 17kbps) 太低了，会导致起播画质像马赛克。改为 1Mbps 更适合电视流。
                    defaultBandwidthEstimate: 1000000, 
                    enabled: true,
                    restrictions: {
                        minHeight: 359,
                        maxHeight: 720
                    }
                },
                streaming: {
                    // 优化 2：针对 IPTV 直播流的缓冲策略优化
                    bufferingGoal: 15,     // 稍微增加目标缓冲，抵抗网络抖动
                    rebufferingGoal: 2,    // 卡顿后只需缓冲 2 秒就恢复播放，减少无聊等待
                    jumpLargeGaps: true    // 遇到丢包或坏帧导致的流断层，自动跳过去，防止画面永久卡死
                },
                manifest: {
                    dash: {
                        ignoreMinBufferTime: true // 忽略 MPD 官方文件中可能存在的保守延迟要求，让直播更实时
                    },
                    retryParameters: { maxAttempts: 3 }
                },
                networking: { retryParameters: { maxAttempts: 3 } }
            });

            player.addEventListener('error', onPlayerErrorEvent);
            controls.addEventListener('error', onUIErrorEvent);

            try {
                await player.load(manifestUri);
                console.log('TV1 直播流已成功加载。');
            } catch (error) {
                onPlayerError(error);
            }
        }

        function onPlayerErrorEvent(errorEvent) { onPlayerError(errorEvent.detail); }
        function onPlayerError(error) { console.error('播放器错误 代码：', error.code, '详情：', error); }
        function onUIErrorEvent(errorEvent) { onPlayerError(errorEvent.detail); }
        function initFailed() { console.error('Shaka UI 加载失败。'); }

        document.addEventListener('shaka-ui-loaded', init);
        document.addEventListener('shaka-ui-load-failed', initFailed);
    </script>

</body>
</html>
