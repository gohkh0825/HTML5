<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <title>EJALTV Okey</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="no-referrer" />
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/controls.min.css" crossorigin="anonymous" />
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/shaka-player.ui.min.js" crossorigin="anonymous"></script>

    <style>
        body { margin: 0; background-color: #000; font-family: sans-serif; overflow: hidden; }
        
        .channel-title {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            color: white;
            opacity: 0.7;
            font-size: 1.5em;
            font-weight: bold;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .player-container {
            position: absolute; 
            top: 0; left: 0; width: 100vw; height: 100vh;
        }

        /* 强制让 Shaka Player 动态生成的内部容器及 video 标签占满外层 100% 空间 */
        .shaka-video-container,
        #video {
            width: 100% !important;
            height: 100% !important;
        }

        /* 自定义精美 UI 样式 */
        .shaka-seek-bar-container .shaka-seek-bar,
        .shaka-volume-bar-container .shaka-volume-bar {
            background: linear-gradient(to right, #051937, #00205b, #00247e, #22229f, #510dbc);
        }
        .shaka-video-container .material-icons-round { color: #00abe2; }
    </style>
</head>
<body>

    <div class="channel-title">EJALTV Okey</div>

    <div class="player-container" data-shaka-player-container>
        <video autoplay data-shaka-player poster="https://rtm-images.glueapi.io/480x0/live_channel/Okey.jpg" id="video"></video>
    </div>

    <script>
        const manifestUri = "https://billowing-block-7887.gohkh0825.workers.dev/?id=okey1/HLS/okey1";

        async function init() {
            const video = document.getElementById('video');
            const ui = video['ui'];
            const controls = ui.getControls();
            const player = controls.getPlayer();

            player.configure({
                drm: {
                    servers: {
                        /* 动态向远程 License Server 索取解密密钥 */
                        'org.w3.clearkey': 'https://php.gohkh7.eu.org/rtmklik/key-3'
                    }
                },
                abr: {
                    defaultBandwidthEstimate: 1000000,
                    enabled: true
                },
                streaming: {
                    bufferingGoal: 15,
                    rebufferingGoal: 2
                },
                manifest: {
                    dash: { ignoreMinBufferTime: true },
                    retryParameters: { maxAttempts: 3 }
                }
            });

            // 监听错误
            player.addEventListener('error', (e) => console.error('播放器错误:', e.detail));

            try {
                await player.load(manifestUri);
                console.log('TV1 直播流已成功加载。');
            } catch (error) {
                console.error('加载失败:', error);
            }
        }

        document.addEventListener('shaka-ui-loaded', init);
    </script>
</body>
</html>
